name: Build & Deploy iOS to TestFlight

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['src/**', 'App.tsx', 'app.json', 'package.json']

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild iOS native project (no pod install)
        run: npx expo prebuild --platform ios --clean --non-interactive --no-install

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Import certificate
        run: |
          echo "${{ secrets.IOS_P12_BASE64 }}" | base64 --decode > dist.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import dist.p12 \
            -k build.keychain \
            -P "${{ secrets.IOS_P12_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm dist.p12

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_PATH=~/Library/MobileDevice/Provisioning\ Profiles/08ed62a5-a1a6-450c-9a19-53ba3168ee55.mobileprovision
          echo "${{ secrets.IOS_PROVISION_BASE64 }}" | base64 --decode > "$PROFILE_PATH"

      - name: Decode App Store Connect key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      - name: Build iOS archive
        run: |
          XCWORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" -type d | head -1)
          echo "Workspace: $XCWORKSPACE"
          SCHEME=$(xcodebuild -list -workspace "$XCWORKSPACE" 2>/dev/null | awk '/Schemes:/,/^$/' | tail -n +2 | head -1 | xargs)
          echo "Using scheme: $SCHEME"
          xcodebuild archive \
            -workspace "$XCWORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/ColourDetective.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="08ed62a5-a1a6-450c-9a19-53ba3168ee55" \
            PROVISIONING_PROFILE_SPECIFIER="Colour Detective Distribution" \
            DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            -allowProvisioningUpdates

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${{ secrets.IOS_TEAM_ID }}</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>iPhone Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>uk.co.colourdetective.app</key>
              <string>Colour Detective Distribution</string>
            </dict>
            <key>uploadSymbols</key><true/>
            <key>compileBitcode</key><false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/ColourDetective.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to TestFlight
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$(ls $RUNNER_TEMP/export/*.ipa | head -1)" \
            --apiKey "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: colour-detective-ios
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30
